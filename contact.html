<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#000000">
    <title>security contact</title>
    <link rel="preload" as="image" href="assets/pages/contact.png?v=20260610-figma12">
    <link rel="stylesheet" href="styles.css?v=20260610-figma12">
  </head>
  <body class="page page-static page-contact">
    <main class="scroll-shell" aria-label="security contact">
      <section class="figma-stage static-stage" style="--frame-w: 1512; --frame-h: 982">
        <img class="static-frame" src="assets/pages/contact.png?v=20260610-figma12" alt="security contact form">
        <nav class="hotspots" aria-label="Primary">
          <a class="hotspot hotspot-home" href="index.html?v=20260610-figma12" aria-label="Home"><img src="assets/nav/contact-wordmark.png?v=20260610-figma12" alt=""></a>
          <a class="hotspot hotspot-contact" href="contact.html?v=20260610-figma12" aria-label="Contact" aria-current="page"><img src="assets/nav/contact-phone.png?v=20260610-figma12" alt=""></a>
          <a class="hotspot hotspot-issue" href="issue.html?v=20260610-figma12" aria-label="Issue"><img src="assets/nav/contact-book.png?v=20260610-figma12" alt=""></a>
          <a class="hotspot hotspot-shop" href="shop.html?v=20260610-figma12" aria-label="Shop"><img src="assets/nav/contact-bag.png?v=20260610-figma12" alt=""></a>
        </nav>
        <form class="contact-overlay" onsubmit="return false" aria-label="Contact form">
          <label class="sr-only" for="first-name">Name</label>
          <input id="first-name" name="name" autocomplete="given-name">
          <label class="sr-only" for="last-name">Last name</label>
          <input id="last-name" name="last_name" autocomplete="family-name">
          <label class="sr-only" for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="email">
          <label class="sr-only" for="message">Message</label>
          <textarea id="message" name="message"></textarea>
          <a class="contact-instagram" href="https://www.instagram.com/krishadave__/" target="_blank" rel="noopener noreferrer" aria-label="Krisha Dave on Instagram">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
              <rect x="2" y="2" width="20" height="20" rx="5.5"></rect>
              <circle cx="12" cy="12" r="4.2"></circle>
              <circle cx="17.4" cy="6.6" r="1.15" fill="currentColor" stroke="none"></circle>
            </svg>
          </a>
        </form>
      </section>
      <form class="mobile-contact-form" onsubmit="return false" aria-label="Mobile contact form">
        <label for="mobile-first-name">NAME</label>
        <input id="mobile-first-name" name="name" autocomplete="given-name">
        <label for="mobile-last-name">LAST NAME</label>
        <input id="mobile-last-name" name="last_name" autocomplete="family-name">
        <label for="mobile-email">EMAIL</label>
        <input id="mobile-email" name="email" type="email" autocomplete="email">
        <label for="mobile-message">MESSAGE</label>
        <textarea id="mobile-message" name="message"></textarea>
        <a class="contact-instagram" href="https://www.instagram.com/krishadave__/" target="_blank" rel="noopener noreferrer" aria-label="Krisha Dave on Instagram">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
            <rect x="2" y="2" width="20" height="20" rx="5.5"></rect>
            <circle cx="12" cy="12" r="4.2"></circle>
            <circle cx="17.4" cy="6.6" r="1.15" fill="currentColor" stroke="none"></circle>
          </svg>
        </a>
      </form>
    </main>
    <nav class="mobile-dock" aria-label="Mobile primary">
      <a class="dock-link dock-home" href="index.html?v=20260610-figma12" aria-label="Home"><span class="dock-icon"></span></a>
      <a class="dock-link dock-contact" href="contact.html?v=20260610-figma12" aria-label="Contact" aria-current="page"><span class="dock-icon"></span></a>
      <a class="dock-link dock-issue" href="issue.html?v=20260610-figma12" aria-label="Issue"><span class="dock-icon"></span></a>
      <a class="dock-link dock-shop" href="shop.html?v=20260610-figma12" aria-label="Shop"><span class="dock-icon"></span></a>
    </nav>
    <script src="script.js?v=20260610-figma12" defer></script>
  </body>
</html>
